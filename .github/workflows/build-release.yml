name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set Environment Variables
        run: |
          echo "packageName=me.elian.warden" >> "$GITHUB_ENV"
          echo "zipFile=me.elian.warden-${{ steps.version.outputs.version }}.zip" >> "$GITHUB_ENV"
          echo "unityPackage=me.elian.warden-${{ steps.version.outputs.version }}.unitypackage" >> "$GITHUB_ENV"
          echo "version=${{ steps.version.outputs.version }}" >> "$GITHUB_ENV"

      - name: Create VPM Package Zip
        run: |
          zip -r "${{ env.zipFile }}" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "unitypackage-stage/*" \
            -x "metaList"

      - name: Stage UnityPackage Layout
        run: |
          mkdir -p "unitypackage-stage/Packages/${{ env.packageName }}"
          rsync -a ./ "unitypackage-stage/Packages/${{ env.packageName }}/" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "unitypackage-stage" \
            --exclude "${{ env.zipFile }}" \
            --exclude "${{ env.unityPackage }}" \
            --exclude "metaList"

      - name: Track Package Meta Files
        working-directory: unitypackage-stage
        run: |
          find "Packages/${{ env.packageName }}/" -name "*.meta" > ../metaList

      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@v1.2.3
        with:
          working-folder: unitypackage-stage
          package-path: ../${{ env.unityPackage }}
          include-files: ../metaList

      - name: Make Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.zipFile }}
            ${{ env.unityPackage }}
            package.json
          tag_name: ${{ env.version }}
