name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set Environment Variables
        run: |
          echo "zipFile=me.elian.warden-${{ steps.version.outputs.version }}.zip" >> "$GITHUB_ENV"
          echo "unityPackage=me.elian.warden-${{ steps.version.outputs.version }}.unitypackage" >> "$GITHUB_ENV"
          echo "version=${{ steps.version.outputs.version }}" >> "$GITHUB_ENV"

      - name: Create Package Zip
        run: |
          zip -r "${{ env.zipFile }}" . \
            -x ".git/*" \
            -x ".github/*"

      - name: Track Package Meta Files
        run: |
          find . -name "*.meta" \
            -not -path "./.git/*" \
            -not -path "./.github/*" > metaList

      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@v1.2.3
        with:
          package-path: ${{ env.unityPackage }}
          include-files: metaList

      - name: Create Tag
        uses: rickstaa/action-create-tag@v1
        with:
          tag: "${{ env.version }}"

      - name: Make Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.zipFile }}
            ${{ env.unityPackage }}
            package.json
          tag_name: ${{ env.version }}
